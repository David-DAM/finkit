version: 2

project_name: finkit

builds:
  - binary: finkit
    ldflags:
      - -s -w
      - -X finkit/internal/version.Version={{ .Version }}
      - -X finkit/internal/version.Commit={{ .Commit }}
      - -X finkit/internal/version.Date={{ .Date }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: github